apiVersion: apps/v1
kind: Deployment
metadata:
  name: railway-kuber
spec:
  replicas: 2
  selector:
    matchLabels:
      app: railway-kuber
  template:
    metadata:
      labels:
        app: railway-kuber
    spec:
      containers:
      - name: railway-kuber
        image: suryathejas/railway-kuber:latest   # ✅ YOUR IMAGE
        ports:
        - containerPort: 80                      # ✅ NGINX serves on 80
---
apiVersion: v1
kind: Service
metadata:
  name: railway-kuber-service
spec:
  type: NodePort
  selector:
    app: railway-kuber
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30007